version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    groups:
      android-build:
        patterns:
          - "com.android.*"
          - "org.jetbrains.kotlin*"
      androidx:
        patterns:
          - "androidx.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
